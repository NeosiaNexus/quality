version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      biome:
        patterns:
          - "@biomejs/biome"
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "@biomejs/biome"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: chore(ci)
